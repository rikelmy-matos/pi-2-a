# =============================================================
# Agenda Telefonica — application.properties
# =============================================================

spring.application.name=agenda-telefonica

# --- PostgreSQL ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agenda_db}
spring.datasource.username=${DB_USER:agenda_user}
spring.datasource.password=${DB_PASS:agenda_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Desabilita banner padrao do Spring Boot ---
spring.main.banner-mode=off

# --- Nivel de log ---
logging.level.com.pi.agenda=INFO
logging.level.org.hibernate.SQL=WARN
