services:

  postgres:
    image: postgres:16-alpine
    container_name: agenda_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenda_db
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: agenda_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenda_user -d agenda_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agenda_db
      DB_USER: agenda_user
      DB_PASS: agenda_pass
    stdin_open: true
    tty: true

volumes:
  postgres_data:
